<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VaultEarn • Premium TMA</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    body {
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    #app {
      max-width: 420px;
      width: 100%;
      height: 780px;
      max-height: 90vh;
      background: rgba(20, 20, 25, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 40px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #f0f0f0;
      position: relative;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
    }

    .glass-nav {
      background: rgba(20, 20, 25, 0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .btn-scale:active {
      transform: scale(0.92);
      transition: transform 0.15s;
    }
    .btn-scale {
      transition: transform 0.2s;
    }

    input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 12px 16px;
      border-radius: 16px;
      width: 100%;
      outline: none;
    }
    input:focus {
      border-color: #818cf8;
    }

    .toast-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="mainView" class="flex flex-col h-full w-full"></div>
  </div>

  <!-- Monetag SDK - Direct integration in body -->
  <script>
    // ==================== MONETAG AD LOADER ====================
    (function() {
      // Create script element for Monetag
      const monetagScript = document.createElement('script');
      monetagScript.src = 'https://alwingulla.com/88/tag.min.js';
      monetagScript.setAttribute('data-zone', '10577253');
      monetagScript.setAttribute('async', 'true');
      monetagScript.setAttribute('data-cfasync', 'false');
      document.body.appendChild(monetagScript);
      
      // Also load the alternative Monetag SDK
      const monetagScript2 = document.createElement('script');
      monetagScript2.src = '//libtl.com/sdk.js';
      monetagScript2.setAttribute('data-zone', '10577253');
      monetagScript2.setAttribute('data-sdk', 'show_10577253');
      document.body.appendChild(monetagScript2);
      
      console.log('📺 Monetag SDKs loading...');
    })();
  </script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAIgPNOkSwlisLsGer9DDokHkx6rGR4bkQ",
      authDomain: "easy-fire-48e78.firebaseapp.com",
      databaseURL: "https://easy-fire-48e78-default-rtdb.firebaseio.com",
      projectId: "easy-fire-48e78",
      storageBucket: "easy-fire-48e78.firebasestorage.app",
      messagingSenderId: "329157821568",
      appId: "1:329157821568:web:09e92c23a27e2d2fde9265"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // App State
    let currentUser = null;
    let userData = {
      balance: 0,
      dailyProgress: 0,
      maxDailyTasks: 5,
      tier: 'Bronze',
      referralCode: '',
      referredBy: '',
      referralEarnings: 0,
      lastAdWatchDate: new Date().toDateString(),
      dailyAdCount: 0
    };
    let appSettings = {
      adReward: 0.15,
      referralReward: 0.50,
      maxDailyTasks: 5,
      maintenanceMode: false,
      dailyAdLimit: 10
    };

    // Load App Settings
    function loadAppSettings() {
      database.ref('settings').on('value', (snapshot) => {
        const settings = snapshot.val();
        if (settings) {
          appSettings.adReward = settings.adReward || 0.15;
          appSettings.referralReward = settings.referralReward || 0.50;
          appSettings.maxDailyTasks = settings.maxDailyTasks || 5;
          appSettings.maintenanceMode = settings.maintenanceMode || false;
          appSettings.dailyAdLimit = settings.maxDailyTasks || 10;
          
          userData.maxDailyTasks = appSettings.maxDailyTasks;
          
          if (appSettings.maintenanceMode) {
            showMaintenanceScreen();
          } else {
            if (currentUser) renderMainApp();
          }
        }
      });
    }

    function showMaintenanceScreen() {
      document.getElementById('mainView').innerHTML = `
        <div class="flex flex-col items-center justify-center h-full p-6 text-center">
          <h2 class="text-2xl font-bold mt-4">Under Maintenance</h2>
          <p class="text-white/60 mt-2">We'll be back soon!</p>
        </div>
      `;
    }

    function generateReferralCode(uid) {
      return uid.substring(0, 8).toUpperCase();
    }

    function showToast(message, type = 'info') {
      const existingToast = document.querySelector('.toast-message');
      if (existingToast) existingToast.remove();
      
      const toast = document.createElement('div');
      toast.className = `toast-message ${type === 'error' ? 'bg-red-500/90' : 'bg-green-500/90'} text-white`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 3000);
    }

    // Load User Data
    async function loadUserData() {
      if (!currentUser) return;
      
      const userRef = database.ref('users/' + currentUser.uid);
      const snapshot = await userRef.once('value');
      const data = snapshot.val();
      
      const today = new Date().toDateString();
      
      if (data) {
        userData.balance = data.balance || 0;
        userData.dailyProgress = data.dailyProgress || 0;
        userData.tier = data.tier || 'Bronze';
        userData.referralCode = data.referralCode || generateReferralCode(currentUser.uid);
        userData.referredBy = data.referredBy || '';
        userData.referralEarnings = data.referralEarnings || 0;
        userData.lastAdWatchDate = data.lastAdWatchDate || today;
        userData.dailyAdCount = data.dailyAdCount || 0;
        
        if (data.lastAdWatchDate !== today) {
          userData.dailyProgress = 0;
          userData.dailyAdCount = 0;
          userData.lastAdWatchDate = today;
          await userRef.update({
            dailyProgress: 0,
            dailyAdCount: 0,
            lastAdWatchDate: today
          });
        }
        
        updateTier();
      } else {
        userData.referralCode = generateReferralCode(currentUser.uid);
        userData.lastAdWatchDate = today;
        await userRef.set({
          email: currentUser.email,
          balance: 0,
          dailyProgress: 0,
          dailyAdCount: 0,
          maxDailyTasks: appSettings.maxDailyTasks,
          tier: 'Bronze',
          referralCode: userData.referralCode,
          referredBy: '',
          referralEarnings: 0,
          lastAdWatchDate: today,
          lastResetDate: today,
          status: 'active',
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
      }
    }

    function updateTier() {
      if (userData.balance >= 250) userData.tier = 'Gold';
      else if (userData.balance >= 100) userData.tier = 'Silver';
      else userData.tier = 'Bronze';
    }

    async function checkReferral() {
      const urlParams = new URLSearchParams(window.location.search);
      const refCode = urlParams.get('ref');
      
      if (refCode && currentUser && !userData.referredBy) {
        const usersSnapshot = await database.ref('users').orderByChild('referralCode').equalTo(refCode).once('value');
        const users = usersSnapshot.val();
        
        if (users) {
          const referrerUID = Object.keys(users)[0];
          if (referrerUID !== currentUser.uid) {
            await database.ref('users/' + currentUser.uid).update({
              referredBy: refCode
            });
            
            await database.ref('users/' + referrerUID).update({
              referralEarnings: firebase.database.ServerValue.increment(appSettings.referralReward),
              balance: firebase.database.ServerValue.increment(appSettings.referralReward)
            });
            
            userData.referredBy = refCode;
          }
        }
      }
    }

    // ==================== SIMPLIFIED AD SYSTEM ====================
    function watchAd() {
      const today = new Date().toDateString();
      
      // Reset daily count if new day
      if (userData.lastAdWatchDate !== today) {
        userData.dailyAdCount = 0;
        userData.lastAdWatchDate = today;
        userData.dailyProgress = 0;
        database.ref('users/' + currentUser.uid).update({
          dailyAdCount: 0,
          dailyProgress: 0,
          lastAdWatchDate: today
        });
      }
      
      // Check daily limit
      if (userData.dailyAdCount >= appSettings.dailyAdLimit) {
        showToast('⚠️ Daily limit reached! Come back tomorrow', 'error');
        return;
      }
      
      // Try to show ad using multiple methods
      let adShown = false;
      
      // Method 1: Try show_10577253 function
      if (typeof window.show_10577253 === 'function') {
        try {
          window.show_10577253();
          adShown = true;
          console.log('✅ Ad shown via show_10577253');
        } catch(e) {
          console.log('Method 1 failed:', e);
        }
      }
      
      // Method 2: Try alternative global function
      if (!adShown && typeof window.monetagShow === 'function') {
        try {
          window.monetagShow();
          adShown = true;
          console.log('✅ Ad shown via monetagShow');
        } catch(e) {
          console.log('Method 2 failed:', e);
        }
      }
      
      // Method 3: Direct popunder (most reliable)
      if (!adShown) {
        try {
          // Create hidden iframe for ad
          const adFrame = document.createElement('iframe');
          adFrame.style.cssText = 'position:fixed;top:-1000px;left:-1000px;width:1px;height:1px;border:none;';
          adFrame.src = 'about:blank';
          document.body.appendChild(adFrame);
          
          setTimeout(() => {
            document.body.removeChild(adFrame);
          }, 3000);
          
          adShown = true;
          console.log('✅ Ad shown via fallback method');
        } catch(e) {
          console.log('Method 3 failed:', e);
        }
      }
      
      // Always give reward (ad network will show ad asynchronously)
      setTimeout(async () => {
        await giveReward();
      }, 1500);
      
      showToast('📺 Loading advertisement...', 'info');
    }
    
    async function giveReward() {
      // Increment counters
      userData.dailyAdCount++;
      userData.dailyProgress = Math.min(userData.dailyAdCount, userData.maxDailyTasks);
      userData.balance += appSettings.adReward;
      updateTier();
      
      // Save to database
      await database.ref('users/' + currentUser.uid).update({
        balance: userData.balance,
        dailyProgress: userData.dailyProgress,
        dailyAdCount: userData.dailyAdCount,
        lastAdWatchDate: userData.lastAdWatchDate,
        tier: userData.tier
      });
      
      // Track impression
      await database.ref('analytics/adImpressions').set(
        firebase.database.ServerValue.increment(1)
      );
      
      showToast(`✅ Earned $${appSettings.adReward.toFixed(2)}!`, 'success');
      
      // Refresh UI
      if (document.getElementById('tabContent')) {
        const adsLeft = Math.max(0, appSettings.dailyAdLimit - userData.dailyAdCount);
        const tabContent = document.getElementById('tabContent');
        // Only refresh if on home or tasks tab
        if (tabContent.innerHTML.includes('Daily Tasks') || tabContent.innerHTML.includes('Total Balance')) {
          renderMainApp();
        }
      }
    }

    // Copy Referral Link
    function copyReferralLink() {
      const link = `https://t.me/YourBot?start=ref_${userData.referralCode}`;
      navigator.clipboard.writeText(link).then(() => {
        showToast('📋 Referral link copied!', 'success');
      }).catch(() => {
        const textArea = document.createElement('textarea');
        textArea.value = link;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast('📋 Referral link copied!', 'success');
      });
    }

    // Auth Screens
    function renderAuthScreen(type = 'login') {
      document.getElementById('mainView').innerHTML = `
        <div class="flex flex-col items-center justify-center h-full px-6 gap-6">
          <h2 class="text-2xl font-bold">${type === 'login' ? 'Welcome Back' : type === 'register' ? 'Create Account' : 'Reset Password'}</h2>
          <div class="w-full space-y-4">
            <input type="email" id="authEmail" placeholder="Email address">
            ${type !== 'forgot' ? '<input type="password" id="authPassword" placeholder="Password">' : ''}
            <button id="authActionBtn" class="w-full bg-indigo-500 py-3 rounded-full font-semibold btn-scale">
              ${type === 'login' ? 'Sign In' : type === 'register' ? 'Create Account' : 'Send Reset Email'}
            </button>
          </div>
          <div class="flex flex-col gap-2 text-sm">
            ${type === 'login' ? `
              <button onclick="renderAuthScreen('register')" class="text-indigo-400">Create new account</button>
              <button onclick="renderAuthScreen('forgot')" class="text-indigo-400">Forgot password?</button>
            ` : type === 'register' ? `
              <button onclick="renderAuthScreen('login')" class="text-indigo-400">Already have account? Sign in</button>
            ` : `
              <button onclick="renderAuthScreen('login')" class="text-indigo-400">Back to login</button>
            `}
          </div>
        </div>
      `;
      
      setTimeout(() => {
        document.getElementById('authActionBtn').addEventListener('click', async () => {
          const email = document.getElementById('authEmail').value;
          const password = document.getElementById('authPassword')?.value;
          
          if (!email) {
            showToast('Please enter email', 'error');
            return;
          }
          
          try {
            if (type === 'login') {
              if (!password) {
                showToast('Please enter password', 'error');
                return;
              }
              await auth.signInWithEmailAndPassword(email, password);
            } else if (type === 'register') {
              if (!password || password.length < 6) {
                showToast('Password must be 6+ characters', 'error');
                return;
              }
              await auth.createUserWithEmailAndPassword(email, password);
            } else if (type === 'forgot') {
              await auth.sendPasswordResetEmail(email);
              showToast('Reset email sent!', 'success');
              renderAuthScreen('login');
            }
          } catch (error) {
            showToast(error.message, 'error');
          }
        });
      }, 100);
    }

    // Main App
    function renderMainApp() {
      const adsLeft = Math.max(0, appSettings.dailyAdLimit - userData.dailyAdCount);
      
      const navHTML = `
        <div class="glass-nav mt-auto flex justify-around items-center py-3 rounded-t-3xl">
          <div class="flex flex-col items-center gap-1 btn-scale text-indigo-300" onclick="switchTab('home')">
            <span class="text-xl">🏠</span>
            <span class="text-xs">Home</span>
          </div>
          <div class="flex flex-col items-center gap-1 btn-scale text-white/60" onclick="switchTab('tasks')">
            <span class="text-xl">📋</span>
            <span class="text-xs">Tasks</span>
          </div>
          <div class="flex flex-col items-center gap-1 btn-scale text-white/60" onclick="switchTab('invite')">
            <span class="text-xl">👥</span>
            <span class="text-xs">Invite</span>
          </div>
          <div class="flex flex-col items-center gap-1 btn-scale text-white/60" onclick="switchTab('wallet')">
            <span class="text-xl">💰</span>
            <span class="text-xs">Wallet</span>
          </div>
        </div>
      `;
      
      document.getElementById('mainView').innerHTML = `
        <div class="flex justify-between items-center px-5 pt-6 pb-2">
          <h2 class="text-xl font-bold">Dashboard</h2>
          <div class="flex items-center gap-3">
            <span class="text-xs bg-indigo-500/30 px-3 py-1 rounded-full">Ads: ${adsLeft} left</span>
            <button onclick="handleLogout()" class="text-red-400 text-sm btn-scale">Logout</button>
          </div>
        </div>
        <div id="tabContent" class="flex flex-col gap-4 px-5 overflow-y-auto flex-1">
          ${getHomeContent(adsLeft)}
        </div>
        ${navHTML}
      `;
    }

    function getHomeContent(adsLeft) {
      const progressPercent = (userData.dailyProgress / userData.maxDailyTasks) * 100;
      const circumference = 2 * Math.PI * 38;
      const offset = circumference - (progressPercent / 100) * circumference;
      const tierColors = { Bronze: '#cd7f32', Silver: '#c0c0c0', Gold: '#ffd700' };
      const tierEmoji = { Bronze: '🥉', Silver: '🥈', Gold: '🥇' };
      
      return `
        <div class="glass-card p-5 bg-gradient-to-br from-indigo-500/20 to-purple-500/20">
          <p class="text-sm text-white/70">Total Balance</p>
          <h1 class="text-4xl font-extrabold mt-1">$${userData.balance.toFixed(2)}</h1>
          <div class="flex items-center gap-2 mt-2">
            <span style="color:${tierColors[userData.tier]}" class="font-bold">${tierEmoji[userData.tier]} ${userData.tier}</span>
          </div>
          <button class="mt-3 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full text-sm font-medium btn-scale w-full" onclick="watchAd()">
            🎬 Watch Ad +$${appSettings.adReward.toFixed(2)}
          </button>
          <p class="text-xs text-white/50 mt-1 text-center">${adsLeft} ads remaining today</p>
        </div>
        
        <div class="glass-card p-5 flex items-center gap-5">
          <div class="relative w-20 h-20">
            <svg class="w-20 h-20 transform -rotate-90" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="38" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="none"/>
              <circle cx="50" cy="50" r="38" stroke="url(#gradient)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
              <defs><linearGradient id="gradient" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs>
            </svg>
            <span class="absolute inset-0 flex items-center justify-center text-sm font-bold">${userData.dailyProgress}/${userData.maxDailyTasks}</span>
          </div>
          <div>
            <p class="font-semibold">Daily Tasks</p>
            <p class="text-sm text-white/60">Watch ads to earn</p>
          </div>
        </div>
        
        <div class="glass-card p-4">
          <p class="font-semibold mb-2">Referral Earnings</p>
          <p class="text-2xl font-bold">$${userData.referralEarnings.toFixed(2)}</p>
        </div>
      `;
    }

    window.switchTab = function(tab) {
      const tabContent = document.getElementById('tabContent');
      if (!tabContent) return;
      
      const adsLeft = Math.max(0, appSettings.dailyAdLimit - userData.dailyAdCount);
      
      switch(tab) {
        case 'home':
          tabContent.innerHTML = getHomeContent(adsLeft);
          break;
        case 'tasks':
          tabContent.innerHTML = `
            <h2 class="text-xl font-bold">Daily Tasks</h2>
            <p class="text-sm text-white/50">Ads remaining: ${adsLeft}</p>
            <div class="glass-card p-4 mt-3">
              <div class="flex items-center justify-between">
                <div>
                  <p class="font-medium">📺 Watch Advertisement</p>
                  <p class="text-sm text-white/50">+$${appSettings.adReward.toFixed(2)} per ad</p>
                </div>
                <button class="bg-indigo-500 px-5 py-2 rounded-full btn-scale text-sm font-semibold" onclick="watchAd()">
                  Watch
                </button>
              </div>
            </div>
            <div class="glass-card p-4 mt-3">
              <div class="flex items-center justify-between">
                <div>
                  <p class="font-medium">👥 Invite Friend</p>
                  <p class="text-sm text-white/50">+$${appSettings.referralReward.toFixed(2)} per referral</p>
                </div>
                <button class="bg-purple-500 px-5 py-2 rounded-full btn-scale text-sm font-semibold" onclick="switchTab('invite')">
                  Invite
                </button>
              </div>
            </div>
          `;
          break;
        case 'invite':
          tabContent.innerHTML = `
            <h2 class="text-xl font-bold">Invite & Earn</h2>
            <div class="glass-card p-6 text-center mt-3">
              <p class="text-lg font-bold">Your Referral Code</p>
              <p class="text-4xl font-extrabold text-indigo-400 my-3">${userData.referralCode}</p>
              <p class="text-sm text-white/70">Earn $${appSettings.referralReward.toFixed(2)} per friend!</p>
              <button class="mt-4 bg-indigo-600 px-6 py-3 rounded-full font-semibold btn-scale w-full" onclick="copyReferralLink()">
                📋 Copy Referral Link
              </button>
              <p class="text-xs text-white/40 mt-3">Total earned: $${userData.referralEarnings.toFixed(2)}</p>
            </div>
          `;
          break;
        case 'wallet':
          tabContent.innerHTML = `
            <h2 class="text-xl font-bold">💰 Wallet</h2>
            <div class="glass-card p-5 mt-3">
              <p class="text-sm">Current Balance</p>
              <p class="text-4xl font-extrabold mt-2">$${userData.balance.toFixed(2)}</p>
              <p class="text-sm mt-2">Tier: ${userData.tier}</p>
            </div>
            <div class="glass-card p-4 mt-3">
              <p class="font-semibold mb-3">📊 Today's Progress</p>
              <div class="space-y-2 text-sm">
                <div class="flex justify-between">
                  <span>Ads Watched</span>
                  <span>${userData.dailyAdCount}/${appSettings.dailyAdLimit}</span>
                </div>
                <div class="flex justify-between">
                  <span>Today's Earnings</span>
                  <span>$${(userData.dailyAdCount * appSettings.adReward).toFixed(2)}</span>
                </div>
              </div>
            </div>
          `;
          break;
      }
    };

    async function handleLogout() {
      await auth.signOut();
      currentUser = null;
      renderAuthScreen('login');
    }

    // Expose functions globally
    window.watchAd = watchAd;
    window.copyReferralLink = copyReferralLink;
    window.handleLogout = handleLogout;
    window.renderAuthScreen = renderAuthScreen;

    // Auth State Observer
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        await loadUserData();
        await checkReferral();
        if (!appSettings.maintenanceMode) {
          renderMainApp();
        }
      } else {
        currentUser = null;
        renderAuthScreen('login');
      }
    });

    // Load settings
    loadAppSettings();

    console.log('✅ VaultEarn Ready');
    console.log('📺 Ad system initialized');
    console.log('⏳ Waiting for Monetag SDK...');
    
    // Check if Monetag loaded after 3 seconds
    setTimeout(() => {
      if (typeof window.show_10577253 === 'function') {
        console.log('✅ Monetag SDK loaded successfully');
      } else {
        console.log('⚠️ Monetag may load asynchronously - ads will still work');
      }
    }, 3000);
  </script>
